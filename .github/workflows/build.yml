name: Build and push

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Weekly on Monday 03:00 UTC to pick up upstream base image updates
    - cron: "0 3 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/rfsrv/php-drupal:latest
          cache-from: type=registry,ref=ghcr.io/rfsrv/php-drupal:cache
          cache-to: type=registry,ref=ghcr.io/rfsrv/php-drupal:cache,mode=max
